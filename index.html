<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identra Labs</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link rel="stylesheet" href="./landing.css">
</head>

<body>
    <section class="hero-sect">
        <div class="left-side">
            <img class="left-img" src="./images/Hybrid science and technology logo.png" alt="">
            <div class="left-txt">
                <h1>Identra </h1>
                <h2>Labs</h2>
            </div>
        </div>
        <div class="right-side">
            <h3 class="generate"><a href="">Generate</a></h3>
            <h4 class="history"><a href="">History</a></h4>
            <h4 class="export"><a href="">Export</a></h4>
        </div>
        <div class="main-container">
            <div class="hero-section">
                <h4 class="small-title">SYNTHETIC IDENTITY ENGINE</h4>
                <h1 class="main-title">
                    Generate a <br>
                    <span>realistic identity</span>
                </h1>
                <button id="generateBtn" class="generate-btn">
                   <ion-icon name="settings-sharp"></ion-icon> Generate User
                </button>
            </div>
            <div id="result" class="result-section">
                <div class="empty-state">
                    <div class="icon-box"><ion-icon name="person-outline"></ion-icon></div>
                    <h2>No identity generated yet</h2>
                    <p>
                        Click "Generate User" to create a fully synthetic, realistic user profile.
                    </p>
                </div>
            </div>
        </div>
    </section>
</body>
<script src="./index.js"></script>

</html>
